name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_HUSKY_DONT_INSTALL_HOOKS: true

jobs:
  test:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Test DSL
        run: cargo test -p homotopy-dsl
      - name: Validate community catalog
        run: cargo run -p homotopy-dsl --bin homotopy-library -- community-library --check
      - name: Check web app
        run: cargo check -p homotopy-web --target wasm32-unknown-unknown
